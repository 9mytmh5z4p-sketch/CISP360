<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Array Loop Visualization</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    gap: 36px;
  }

  h2 {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
  }

  /* ── Code block ─────────────────────────────── */
  .code-block {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 20px 28px;
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    line-height: 1.75;
    width: 100%;
    max-width: 560px;
  }

  .code-line { color: #94a3b8; transition: color 0.3s; }
  .code-line.dim { color: #334155; }
  .code-line.active { color: #f8fafc; }

  .kw   { color: #7dd3fc; }   /* keyword */
  .ty   { color: #34d399; }   /* type */
  .num  { color: #fbbf24; }   /* number */
  .fn   { color: #c084fc; }   /* function/cout */
  .str  { color: #f87171; }   /* string literal */
  .var  { color: #e2e8f0; }   /* variable */
  .idx  { color: #fb923c; }   /* index i */

  /* ── Array display ───────────────────────────── */
  .array-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 560px;
  }

  .array-label {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #64748b;
    align-self: flex-start;
  }

  .array-row {
    display: flex;
    gap: 0;
  }

  .cell-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .cell {
    width: 88px;
    height: 64px;
    border: 2px solid #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 1.4rem;
    font-weight: 600;
    color: #94a3b8;
    background: #1e293b;
    transition: all 0.35s ease;
    position: relative;
    margin-right: -2px; /* collapse borders */
  }

  .cell:first-child { border-radius: 8px 0 0 8px; }
  .cell:last-child  { border-radius: 0 8px 8px 0; margin-right: 0; }

  .cell.active {
    background: #1d4ed8;
    border-color: #3b82f6;
    color: #f8fafc;
    z-index: 2;
    box-shadow: 0 0 24px rgba(59, 130, 246, 0.5);
    transform: translateY(-4px);
  }

  .cell.done {
    background: #134e2e;
    border-color: #16a34a;
    color: #4ade80;
  }

  .index-label {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: #475569;
    transition: color 0.3s;
  }

  .cell.active ~ * .index-label,
  .cell-wrapper.active .index-label {
    color: #3b82f6;
  }

  /* active index label */
  .cell-wrapper.active .index-label { color: #60a5fa; font-weight: 600; }
  .cell-wrapper.done   .index-label { color: #16a34a; }

  /* ── State panel ─────────────────────────────── */
  .state-panel {
    display: flex;
    gap: 40px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 18px 32px;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    width: 100%;
    max-width: 560px;
  }

  .state-item { display: flex; flex-direction: column; gap: 4px; }
  .state-label { font-size: 0.7rem; letter-spacing: 0.08em; color: #64748b; font-family: 'Segoe UI', sans-serif; }
  .state-val   { color: #e2e8f0; transition: color 0.3s; }
  .state-val.highlight { color: #fb923c; }

  /* ── Output console ──────────────────────────── */
  .output-section {
    width: 100%;
    max-width: 560px;
  }

  .output-label {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 8px;
  }

  .console {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 16px 20px;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    min-height: 56px;
    color: #4ade80;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  .console-line {
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .console-line.visible {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── Controls ────────────────────────────────── */
  .controls {
    display: flex;
    gap: 12px;
  }

  button {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  #btn-step {
    background: #1d4ed8;
    color: #f8fafc;
  }
  #btn-step:hover { background: #2563eb; }
  #btn-step:disabled { background: #1e293b; color: #334155; cursor: not-allowed; }

  #btn-play {
    background: #0f3a1f;
    color: #4ade80;
    border: 1px solid #16a34a;
  }
  #btn-play:hover { background: #14532d; }
  #btn-play:disabled { background: #1e293b; color: #334155; border-color: #334155; cursor: not-allowed; }

  #btn-reset {
    background: transparent;
    color: #64748b;
    border: 1px solid #334155;
  }
  #btn-reset:hover { color: #94a3b8; border-color: #475569; }

  /* ── Done banner ─────────────────────────────── */
  #done-banner {
    font-size: 0.85rem;
    color: #4ade80;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.4s;
    height: 20px;
  }
  #done-banner.visible { opacity: 1; }
</style>
</head>
<body>

<h2>Array Loop — Step Through</h2>

<!-- Code block -->
<div class="code-block">
  <div class="code-line" id="line-decl">
    <span class="kw">const</span> <span class="ty">int</span> <span class="var">SIZE</span> = <span class="num">5</span>;
  </div>
  <div class="code-line" id="line-init">
    <span class="ty">int</span> <span class="var">scores</span>[<span class="var">SIZE</span>] = {<span class="num">91</span>, <span class="num">78</span>, <span class="num">84</span>, <span class="num">95</span>, <span class="num">62</span>};
  </div>
  <div style="height:6px"></div>
  <div class="code-line" id="line-for">
    <span class="kw">for</span> (<span class="ty">int</span> <span class="idx">i</span> = <span class="num">0</span>; <span class="idx">i</span> &lt; <span class="var">SIZE</span>; <span class="idx">i</span>++) {
  </div>
  <div class="code-line" id="line-cout">
    &nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">cout</span> &lt;&lt; <span class="var">scores</span>[<span class="idx">i</span>] &lt;&lt; <span class="str">"\n"</span>;
  </div>
  <div class="code-line" id="line-close">}</div>
</div>

<!-- Array visual -->
<div class="array-section">
  <div class="array-label">scores</div>
  <div class="array-row" id="array-row"></div>
</div>

<!-- State panel -->
<div class="state-panel">
  <div class="state-item">
    <span class="state-label">LOOP VAR</span>
    <span class="state-val" id="disp-i">—</span>
  </div>
  <div class="state-item">
    <span class="state-label">ACCESSING</span>
    <span class="state-val" id="disp-access">—</span>
  </div>
  <div class="state-item">
    <span class="state-label">VALUE</span>
    <span class="state-val highlight" id="disp-value">—</span>
  </div>
</div>

<!-- Output -->
<div class="output-section">
  <div class="output-label">OUTPUT</div>
  <div class="console" id="console"></div>
</div>

<!-- Controls -->
<div class="controls">
  <button id="btn-reset">Reset</button>
  <button id="btn-step">Step →</button>
  <button id="btn-play">▶ Play</button>
</div>

<div id="done-banner">Loop complete — all 5 elements printed.</div>

<script>
  const values = [91, 78, 84, 95, 62];
  const SIZE = values.length;

  let step = -1;   // -1 = not started
  let playInterval = null;

  // Build array cells
  const arrayRow = document.getElementById('array-row');
  values.forEach((v, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'cell-wrapper';
    wrapper.id = `wrapper-${i}`;

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${i}`;
    cell.textContent = v;

    const label = document.createElement('div');
    label.className = 'index-label';
    label.textContent = `scores[${i}]`;

    wrapper.appendChild(cell);
    wrapper.appendChild(label);
    arrayRow.appendChild(wrapper);
  });

  // Console lines
  const consoleEl = document.getElementById('console');
  const lines = [];
  values.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'console-line';
    div.id = `out-${i}`;
    div.textContent = v;
    consoleEl.appendChild(div);
    lines.push(div);
  });

  function setState(i) {
    // Cells
    values.forEach((_, j) => {
      const w = document.getElementById(`wrapper-${j}`);
      const c = document.getElementById(`cell-${j}`);
      w.className = 'cell-wrapper';
      c.className = 'cell';
      if (j < i) {
        w.classList.add('done');
        c.classList.add('done');
      } else if (j === i) {
        w.classList.add('active');
        c.classList.add('active');
      }
    });

    // State panel
    document.getElementById('disp-i').textContent      = `i = ${i}`;
    document.getElementById('disp-access').textContent = `scores[${i}]`;
    document.getElementById('disp-value').textContent  = values[i];

    // Output lines
    lines.forEach((l, j) => {
      if (j <= i) l.classList.add('visible');
    });

    // Code highlight
    ['line-decl','line-init','line-for','line-close'].forEach(id =>
      document.getElementById(id).className = 'code-line dim'
    );
    document.getElementById('line-for').className  = 'code-line active';
    document.getElementById('line-cout').className = 'code-line active';
  }

  function reset() {
    stopPlay();
    step = -1;

    values.forEach((_, j) => {
      document.getElementById(`wrapper-${j}`).className = 'cell-wrapper';
      document.getElementById(`cell-${j}`).className    = 'cell';
    });

    document.getElementById('disp-i').textContent      = '—';
    document.getElementById('disp-access').textContent = '—';
    document.getElementById('disp-value').textContent  = '—';

    lines.forEach(l => l.classList.remove('visible'));

    ['line-decl','line-init','line-for','line-cout','line-close'].forEach(id =>
      document.getElementById(id).className = 'code-line'
    );

    document.getElementById('done-banner').classList.remove('visible');
  }

  function advance() {
    if (step >= SIZE - 1) { reset(); return; }
    step++;
    setState(step);
    if (step === SIZE - 1) {
      stopPlay();
      document.getElementById('done-banner').classList.add('visible');
    }
  }

  function startPlay() {
    if (step >= SIZE - 1) { reset(); }
    document.getElementById('btn-play').textContent = '⏸ Pause';
    document.getElementById('btn-play').onclick = stopPlay;
    playInterval = setInterval(() => {
      advance();
      if (step >= SIZE - 1) stopPlay();
    }, 900);
  }

  function stopPlay() {
    clearInterval(playInterval);
    playInterval = null;
    document.getElementById('btn-play').textContent = '▶ Play';
    document.getElementById('btn-play').onclick = startPlay;
  }

  document.getElementById('btn-step').onclick  = advance;
  document.getElementById('btn-play').onclick  = startPlay;
  document.getElementById('btn-reset').onclick = reset;
</script>
</body>
</html>
