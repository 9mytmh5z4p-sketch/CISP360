<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack &amp; Heap Memory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: grid;
  grid-template-columns: 1fr 80px;
  height: 100vh;
  overflow: hidden;
}

/* ── Content column ─────────────────────────────────────────── */
.content {
  display: flex;
  flex-direction: column;
  padding: 14px 14px 10px 18px;
  gap: 10px;
  overflow: hidden;
}

.top-panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  flex: 1;
  min-height: 0;
}

/* ── Code panel ─────────────────────────────────────────────── */
.code-panel {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
}

.panel-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #475569;
  padding-bottom: 5px;
  border-bottom: 1px solid #1e293b;
}

.code-lines {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.code-line {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  line-height: 1.75;
  color: #334155;
  padding: 0 6px;
  border-radius: 3px;
  transition: color 0.35s, background 0.35s;
  white-space: nowrap;
}

.code-line.active {
  color: #f8fafc;
  background: #1d3461;
}

/* syntax */
.kw  { color: #7dd3fc; }
.ty  { color: #34d399; }
.num { color: #fbbf24; }
.fn  { color: #c084fc; }
.op  { color: #fb923c; }
.cm  { color: #475569; font-style: italic; }

/* ── Memory panel ───────────────────────────────────────────── */
.memory-panel {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}

.mem-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  flex: 1;
  min-height: 0;
}

.mem-section {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.mem-section-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #475569;
  text-align: center;
  padding-bottom: 4px;
  border-bottom: 1px solid #1e293b;
  margin-bottom: 2px;
}

.mem-empty {
  font-family: 'Courier New', monospace;
  font-size: 0.68rem;
  color: #1e293b;
  text-align: center;
  padding: 10px 0;
}

/* ── Memory cells ───────────────────────────────────────────── */
.mem-cell {
  border-radius: 5px;
  padding: 5px 7px;
  font-family: 'Courier New', monospace;
  font-size: 0.73rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.4s ease;
  min-height: 30px;
  gap: 4px;
}

.cell-name { opacity: 0.65; flex-shrink: 0; }
.cell-val  { font-weight: 700; text-align: right; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* frame header */
.cell-frame {
  background: #111827;
  border: 1px solid #1e293b;
  color: #475569;
  font-size: 0.65rem;
  font-weight: 700;
  justify-content: center;
  letter-spacing: 0.05em;
}

/* stack local var — green */
.cell-var {
  background: #052e16;
  border: 1px solid #16a34a;
  color: #4ade80;
}

/* stack pointer, live — blue */
.cell-ptr {
  background: #172554;
  border: 1px solid #3b82f6;
  color: #93c5fd;
}

/* stack pointer, actively dereferencing — orange */
.cell-ptr-active {
  background: #431407;
  border: 1px solid #ea580c;
  color: #fdba74;
  box-shadow: 0 0 10px rgba(234,88,12,0.35);
}

/* stack pointer, dangling — red */
.cell-ptr-dangling {
  background: #3b0000;
  border: 1px dashed #ef4444;
  color: #fca5a5;
}

/* stack pointer, nulled — dim */
.cell-ptr-null {
  background: #1e293b;
  border: 1px solid #334155;
  color: #64748b;
}

/* heap live — blue */
.cell-heap {
  background: #172554;
  border: 1px solid #3b82f6;
  color: #93c5fd;
}

/* heap actively accessed — orange */
.cell-heap-active {
  background: #431407;
  border: 1px solid #ea580c;
  color: #fdba74;
  box-shadow: 0 0 12px rgba(234,88,12,0.4);
}

/* heap freed — dim red dashed */
.cell-heap-freed {
  background: #1a0505;
  border: 1px dashed #7f1d1d;
  color: #6b2020;
  font-style: italic;
}

/* ── Status bar ─────────────────────────────────────────────── */
.status-bar {
  background: #111827;
  border: 1px solid #1e293b;
  border-radius: 6px;
  padding: 7px 12px;
  font-size: 0.8rem;
  color: #475569;
  transition: color 0.3s;
  min-height: 34px;
  display: flex;
  align-items: center;
}

/* ── Controls sidebar ───────────────────────────────────────── */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 10px;
  border-left: 1px solid #1e293b;
  background: #0a1120;
}

.btn {
  background: #1e293b;
  border: 1px solid #334155;
  color: #94a3b8;
  border-radius: 6px;
  padding: 8px 4px;
  font-size: 0.68rem;
  cursor: pointer;
  width: 56px;
  text-align: center;
  transition: background 0.2s, color 0.2s;
  line-height: 1.4;
  user-select: none;
}

.btn:hover { background: #334155; color: #e2e8f0; }

#btn-play {
  background: #1d4ed8;
  border-color: #3b82f6;
  color: #bfdbfe;
}
#btn-play:hover { background: #2563eb; }
</style>
</head>
<body>

<div class="content">
  <div class="top-panels">

    <!-- Code Panel -->
    <div class="code-panel">
      <div class="panel-label">Code</div>
      <div class="code-lines" id="code-lines">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Memory Panel -->
    <div class="memory-panel">
      <div class="panel-label">Memory</div>
      <div class="mem-cols">
        <div class="mem-section">
          <div class="mem-section-label">Stack</div>
          <div id="stack-cells"></div>
        </div>
        <div class="mem-section">
          <div class="mem-section-label">Heap</div>
          <div id="heap-cells"></div>
        </div>
      </div>
    </div>

  </div>
  <div class="status-bar" id="status">Ready — press Step or Play to trace the program.</div>
</div>

<div class="controls">
  <button class="btn" id="btn-play">▶ Play</button>
  <button class="btn" id="btn-step">Step →</button>
  <button class="btn" id="btn-reset">↺ Reset</button>
</div>

<script>
// ── Code lines ───────────────────────────────────────────────────────────────

const CODE = [
  `<span class="ty">int</span> x = <span class="num">10</span>;`,
  `<span class="ty">int*</span> p = <span class="kw">new</span> <span class="ty">int</span>(<span class="num">42</span>);`,
  `<span class="fn">cout</span> <span class="op"><<</span> <span class="op">*</span>p;`,
  `<span class="kw">delete</span> p;`,
  `p = <span class="kw">nullptr</span>;`,
  `<span class="kw">return</span> <span class="num">0</span>;`,
];

// ── States ───────────────────────────────────────────────────────────────────
// stack cell types: 'frame' | 'var' | 'ptr' | 'ptr-active' | 'ptr-dangling' | 'ptr-null'
// heap  cell types: 'heap' | 'heap-active' | 'heap-freed'

function buildStates() {
  return [
    {
      line: -1,
      stack: [],
      heap: [],
      status: 'Ready — press Step or Play to trace the program.',
      color: '#475569',
    },
    {
      line: -1,
      stack: [{ type: 'frame', name: 'main()', val: '' }],
      heap: [],
      status: 'main() is called — a stack frame is pushed.',
      color: '#64748b',
    },
    {
      line: 0,
      stack: [
        { type: 'frame',  name: 'main()', val: '' },
        { type: 'var',    name: 'x',      val: '10' },
      ],
      heap: [],
      status: 'int x = 10 — local variable allocated on the stack.',
      color: '#4ade80',
    },
    {
      line: 1,
      stack: [
        { type: 'frame', name: 'main()', val: '' },
        { type: 'var',   name: 'x',      val: '10' },
        { type: 'ptr',   name: 'p',      val: '→ 0xa8f0' },
      ],
      heap: [
        { type: 'heap', addr: '0xa8f0', val: '42' },
      ],
      status: 'new int(42) — heap block created at 0xa8f0; p stores that address.',
      color: '#93c5fd',
    },
    {
      line: 2,
      stack: [
        { type: 'frame',      name: 'main()', val: '' },
        { type: 'var',        name: 'x',      val: '10' },
        { type: 'ptr-active', name: 'p',      val: '→ 0xa8f0' },
      ],
      heap: [
        { type: 'heap-active', addr: '0xa8f0', val: '42' },
      ],
      status: '*p dereferences p → reads 42 from the heap.',
      color: '#fdba74',
    },
    {
      line: 3,
      stack: [
        { type: 'frame',        name: 'main()', val: '' },
        { type: 'var',          name: 'x',      val: '10' },
        { type: 'ptr-dangling', name: 'p',      val: '→ 0xa8f0 ⚠' },
      ],
      heap: [
        { type: 'heap-freed', addr: '0xa8f0', val: 'freed' },
      ],
      status: 'delete p — heap block released. p is now a dangling pointer.',
      color: '#fca5a5',
    },
    {
      line: 4,
      stack: [
        { type: 'frame',    name: 'main()', val: '' },
        { type: 'var',      name: 'x',      val: '10' },
        { type: 'ptr-null', name: 'p',      val: 'nullptr' },
      ],
      heap: [],
      status: 'p = nullptr — dangling pointer nulled. Heap is clear.',
      color: '#4ade80',
    },
    {
      line: 5,
      stack: [],
      heap: [],
      status: 'return 0 — stack frame released. x and p are gone.',
      color: '#94a3b8',
    },
  ];
}

const STATES = buildStates();
let cur = -1;
let playing = false;
let timer = null;

// ── Render ───────────────────────────────────────────────────────────────────

function renderCode(activeLine) {
  document.getElementById('code-lines').innerHTML = CODE.map((html, i) => {
    const cls = i === activeLine ? 'code-line active' : 'code-line';
    return `<div class="${cls}">${html}</div>`;
  }).join('');
}

function cellClass(type) {
  return {
    'frame':        'cell-frame',
    'var':          'cell-var',
    'ptr':          'cell-ptr',
    'ptr-active':   'cell-ptr-active',
    'ptr-dangling': 'cell-ptr-dangling',
    'ptr-null':     'cell-ptr-null',
    'heap':         'cell-heap',
    'heap-active':  'cell-heap-active',
    'heap-freed':   'cell-heap-freed',
  }[type] || 'cell-var';
}

function renderStack(cells) {
  const el = document.getElementById('stack-cells');
  if (!cells.length) {
    el.innerHTML = '<div class="mem-empty">(empty)</div>';
    return;
  }
  el.innerHTML = cells.map(c => {
    if (c.type === 'frame') {
      return `<div class="mem-cell cell-frame">${c.name}</div>`;
    }
    return `<div class="mem-cell ${cellClass(c.type)}">
      <span class="cell-name">${c.name}</span>
      <span class="cell-val">${c.val}</span>
    </div>`;
  }).join('');
}

function renderHeap(cells) {
  const el = document.getElementById('heap-cells');
  if (!cells.length) {
    el.innerHTML = '<div class="mem-empty">(empty)</div>';
    return;
  }
  el.innerHTML = cells.map(c =>
    `<div class="mem-cell ${cellClass(c.type)}">
      <span class="cell-name">${c.addr}</span>
      <span class="cell-val">${c.val}</span>
    </div>`
  ).join('');
}

function render(state) {
  renderCode(state.line);
  renderStack(state.stack);
  renderHeap(state.heap);
  const s = document.getElementById('status');
  s.textContent = state.status;
  s.style.color = state.color;
}

// ── Controls ─────────────────────────────────────────────────────────────────

function setPlaying(on) {
  playing = on;
  document.getElementById('btn-play').textContent = on ? '⏸ Pause' : '▶ Play';
  if (on) {
    timer = setInterval(() => {
      advance();
      if (cur >= STATES.length - 1) setPlaying(false);
    }, 1300);
  } else {
    clearInterval(timer);
    timer = null;
  }
}

function advance() {
  if (cur >= STATES.length - 1) { doReset(); return; }
  cur++;
  render(STATES[cur]);
  if (cur === STATES.length - 1) setPlaying(false);
}

function doReset() {
  setPlaying(false);
  cur = -1;
  renderCode(-1);
  renderStack([]);
  renderHeap([]);
  const s = document.getElementById('status');
  s.textContent = 'Ready — press Step or Play to trace the program.';
  s.style.color = '#475569';
}

document.getElementById('btn-play').addEventListener('click', () => setPlaying(!playing));
document.getElementById('btn-step').addEventListener('click', advance);
document.getElementById('btn-reset').addEventListener('click', doReset);

// Init
doReset();
</script>
</body>
</html>
