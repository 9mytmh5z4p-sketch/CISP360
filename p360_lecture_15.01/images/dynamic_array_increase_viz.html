<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Array — Increase</title>
<style>
html { font-size: 200%; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  display: grid;
  grid-template-columns: 1fr 60px;
  height: 100vh;
  overflow: hidden;
  padding-right: 72px;
}

/* ── Content column ─────────────────────────────── */
.content {
  display: flex;
  flex-direction: column;
  padding: 6px 6px 6px 8px;
  gap: 5px;
  overflow: hidden;
}

/* ── Status bar ─────────────────────────────────── */
.status-bar {
  background: #1e293b;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 1.06rem;
  font-weight: 600;
  color: #94a3b8;
  transition: color 0.3s, background 0.3s;
  min-height: 32px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

/* ── Three-column panel row ─────────────────────── */
.panels {
  display: grid;
  grid-template-columns: 1.25fr 0.85fr 1fr;
  gap: 5px;
  flex: 1;
  min-height: 0;
}

/* ── Shared panel base ──────────────────────────── */
.panel {
  border-radius: 8px;
  padding: 7px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow: hidden;
  min-height: 0;
}

.panel-label {
  font-size: 0.50rem;
  font-weight: 800;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  text-align: center;
  padding-bottom: 4px;
  border-bottom: 2px solid transparent;
  margin-bottom: 2px;
  flex-shrink: 0;
}

/* ── Code panel ─────────────────────────────────── */
.code-panel { background: #ffffff; border: 1px solid #cbd5e1; }
.code-panel .panel-label { color: #64748b; border-bottom-color: #e2e8f0; text-align: left; }

.code-lines { display: flex; flex-direction: column; }

.code-line {
  font-family: 'Courier New', monospace;
  font-size: 0.70rem;
  line-height: 1.85;
  color: #94a3b8;
  padding: 0 5px;
  border-radius: 3px;
  transition: color 0.3s, background 0.3s;
  white-space: nowrap;
}
.code-line.active { color: #1e293b; background: #fef9c3; }

.kw  { color: #2563eb; }
.ty  { color: #059669; }
.num { color: #d97706; }
.op  { color: #dc2626; }
.cmt { color: #cbd5e1; font-style: italic; }

/* ── Stack panel ────────────────────────────────── */
.stack-panel { background: #f0fdf4; border: 2px solid #4ade80; }
.stack-panel .panel-label { color: #15803d; border-bottom-color: #4ade80; }

/* ── Heap panel ─────────────────────────────────── */
.heap-panel { background: #eff6ff; border: 2px solid #60a5fa; }
.heap-panel .panel-label { color: #1d4ed8; border-bottom-color: #60a5fa; }

/* ── Stack cells ────────────────────────────────── */
.mem-cell {
  border-radius: 4px;
  padding: 4px 6px;
  font-family: 'Courier New', monospace;
  font-size: 0.63rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.35s ease;
  min-height: 26px;
  gap: 4px;
  margin-bottom: 2px;
}
.cell-name { opacity: 0.65; flex-shrink: 0; font-size: 0.60rem; }
.cell-val  { font-weight: 700; text-align: right; flex: 1; overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; }

.cell-frame    { background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b;
                 font-size: 0.57rem; font-weight: 700; justify-content: center; }
.cell-var      { background: #dcfce7; border: 1px solid #4ade80; color: #15803d; }
.cell-var-changed { background: #fef9c3; border: 1px solid #f59e0b; color: #92400e;
                    box-shadow: 0 0 5px rgba(245,158,11,.3); }
.cell-ptr      { background: #dbeafe; border: 1px solid #60a5fa; color: #1d4ed8; }
.cell-ptr-active   { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e;
                     box-shadow: 0 0 6px rgba(245,158,11,.35); }
.cell-ptr-dangling { background: #fee2e2; border: 1px dashed #f87171; color: #b91c1c; }
.cell-ptr-null     { background: #f8fafc; border: 1px solid #cbd5e1; color: #94a3b8; }

/* ── Heap blocks ────────────────────────────────── */
.heap-block {
  border-radius: 6px;
  padding: 5px 6px;
  margin-bottom: 6px;
  transition: all 0.35s ease;
}
.heap-block-label {
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  margin-bottom: 4px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.heap-cells-row { display: flex; gap: 3px; }

.heap-cell {
  flex: 1;
  border-radius: 4px;
  padding: 4px 3px;
  font-family: 'Courier New', monospace;
  text-align: center;
  transition: all 0.35s ease;
  min-height: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
}
.heap-cell-idx { font-size: 0.49rem; opacity: 0.65; }
.heap-cell-val { font-weight: 700; font-size: 0.66rem; }

/* Block-level styles */
.block-normal { background: #dbeafe; border: 1px solid #60a5fa; }
.block-new    { background: #dcfce7; border: 1px solid #4ade80; }
.block-freed  { background: #fef2f2; border: 1px dashed #fca5a5; }

.block-normal .heap-block-label { color: #1d4ed8; }
.block-new    .heap-block-label { color: #15803d; }
.block-freed  .heap-block-label { color: #fca5a5; }

/* Cell-level styles */
.hcell-normal  { background: #bfdbfe; border: 1px solid #93c5fd; color: #1d4ed8; }
.hcell-new     { background: #bbf7d0; border: 1px solid #4ade80; color: #14532d; }
.hcell-active  { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e;
                 box-shadow: 0 0 5px rgba(245,158,11,.4); }
.hcell-empty   { background: #f8fafc; border: 1px dashed #cbd5e1; color: #94a3b8;
                 font-style: italic; }
.hcell-freed   { background: #fef2f2; border: 1px dashed #fca5a5; color: #fca5a5; }

.mem-empty {
  font-family: 'Courier New', monospace;
  font-size: 0.60rem;
  color: #cbd5e1;
  text-align: center;
  padding: 10px 0;
}

/* ── Controls sidebar ───────────────────────────── */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 4px;
  border-left: 1px solid #e2e8f0;
  background: #f8fafc;
}

.btn {
  background: #ffffff;
  border: 1px solid #cbd5e1;
  color: #64748b;
  border-radius: 6px;
  padding: 6px 2px;
  font-size: 0.58rem;
  cursor: pointer;
  width: 48px;
  text-align: center;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  line-height: 1.4;
  user-select: none;
}
.btn:hover { background: #f1f5f9; color: #1e293b; border-color: #94a3b8; }

#btn-play { background: #2563eb; border-color: #2563eb; color: #ffffff; }
#btn-play:hover { background: #1d4ed8; }
</style>
</head>
<body>

<div class="content">
  <div class="status-bar" id="status">Ready — press Step or Play to begin.</div>
  <div class="panels">

    <div class="panel code-panel">
      <div class="panel-label">14-02c.cpp — increase section</div>
      <div class="code-lines" id="code-lines"></div>
    </div>

    <div class="panel stack-panel">
      <div class="panel-label">Stack</div>
      <div id="stack-cells"></div>
    </div>

    <div class="panel heap-panel">
      <div class="panel-label">Heap</div>
      <div id="heap-blocks"></div>
    </div>

  </div>
</div>

<div class="controls">
  <button class="btn" id="btn-play">▶ Play</button>
  <button class="btn" id="btn-step">Step →</button>
  <button class="btn" id="btn-reset">↺ Reset</button>
</div>

<script>
const CODE = [
  `<span class="cmt">// increase by 1</span>`,
  `<span class="ty">int</span><span class="op">*</span> pTemp = <span class="kw">nullptr</span>;`,
  `size<span class="op">++</span>;`,
  `pTemp = <span class="kw">new</span> <span class="ty">int</span>[size];`,
  `pTemp[<span class="num">0</span>] = pInt[<span class="num">0</span>];`,
  `pTemp[<span class="num">1</span>] = <span class="num">20</span>;`,
  `<span class="kw">delete</span>[] pInt;`,
  `pInt  = pTemp;`,
  `pTemp = <span class="kw">nullptr</span>;`,
];

// Each state:
//   line    — code line to highlight (-1 = none)
//   status  — status bar message
//   sColor  — status text color
//   sBg     — status background
//   stack   — array of { t, name, val }
//     t values: frame | var | var-changed | ptr | ptr-active | ptr-dangling | ptr-null
//   heap    — array of blocks { addr, style (normal|new|freed), cells: [{idx, val, style}] }
//     cell style values: normal | new | active | empty | freed

function buildStates() {
  return [

    // ── State 0: Initial ──────────────────────────────────────────
    {
      line: -1,
      status: 'Initial state — pInt owns a 1-element heap array. size = 1. Press Step to begin.',
      sColor: '#94a3b8', sBg: '#1e293b',
      stack: [
        { t: 'frame', name: 'main()', val: '' },
        { t: 'var',   name: 'size',   val: '1' },
        { t: 'ptr',   name: 'pInt',   val: '→ 0xa000' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'normal' },
        ]},
      ],
    },

    // ── State 1: int* pTemp = nullptr ────────────────────────────
    {
      line: 1,
      status: 'Declare pTemp and initialize to nullptr — no heap memory allocated yet.',
      sColor: '#bfdbfe', sBg: '#1e3a5f',
      stack: [
        { t: 'frame',    name: 'main()',  val: '' },
        { t: 'var',      name: 'size',    val: '1' },
        { t: 'ptr',      name: 'pInt',    val: '→ 0xa000' },
        { t: 'ptr-null', name: 'pTemp',   val: 'nullptr' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'normal' },
        ]},
      ],
    },

    // ── State 2: size++ ───────────────────────────────────────────
    {
      line: 2,
      status: 'Step 1 — size++ increments size to 2. This is the new target capacity.',
      sColor: '#bbf7d0', sBg: '#14532d',
      stack: [
        { t: 'frame',       name: 'main()',  val: '' },
        { t: 'var-changed', name: 'size',    val: '2' },
        { t: 'ptr',         name: 'pInt',    val: '→ 0xa000' },
        { t: 'ptr-null',    name: 'pTemp',   val: 'nullptr' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'normal' },
        ]},
      ],
    },

    // ── State 3: pTemp = new int[size] ────────────────────────────
    {
      line: 3,
      status: 'Step 2 — new int[2] allocates a fresh 2-element block at 0xb000. pTemp stores the address.',
      sColor: '#bfdbfe', sBg: '#1e3a5f',
      stack: [
        { t: 'frame',      name: 'main()',  val: '' },
        { t: 'var',        name: 'size',    val: '2' },
        { t: 'ptr',        name: 'pInt',    val: '→ 0xa000' },
        { t: 'ptr-active', name: 'pTemp',   val: '→ 0xb000' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'normal' },
        ]},
        { addr: '0xb000  [pTemp]', style: 'new', cells: [
          { idx: '[0]', val: '?', style: 'empty' },
          { idx: '[1]', val: '?', style: 'empty' },
        ]},
      ],
    },

    // ── State 4: pTemp[0] = pInt[0] ──────────────────────────────
    {
      line: 4,
      status: 'Step 3 — Copy pInt[0] = 10 into pTemp[0]. Existing data safely preserved in the new block.',
      sColor: '#fde68a', sBg: '#78350f',
      stack: [
        { t: 'frame', name: 'main()',  val: '' },
        { t: 'var',   name: 'size',    val: '2' },
        { t: 'ptr',   name: 'pInt',    val: '→ 0xa000' },
        { t: 'ptr',   name: 'pTemp',   val: '→ 0xb000' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'active' },
        ]},
        { addr: '0xb000  [pTemp]', style: 'new', cells: [
          { idx: '[0]', val: '10', style: 'active' },
          { idx: '[1]', val: '?',  style: 'empty' },
        ]},
      ],
    },

    // ── State 5: pTemp[1] = 20 ───────────────────────────────────
    {
      line: 5,
      status: 'Step 4 — Write 20 into pTemp[1]. The temp array is fully populated: [10, 20].',
      sColor: '#bbf7d0', sBg: '#14532d',
      stack: [
        { t: 'frame', name: 'main()',  val: '' },
        { t: 'var',   name: 'size',    val: '2' },
        { t: 'ptr',   name: 'pInt',    val: '→ 0xa000' },
        { t: 'ptr',   name: 'pTemp',   val: '→ 0xb000' },
      ],
      heap: [
        { addr: '0xa000  [pInt]', style: 'normal', cells: [
          { idx: '[0]', val: '10', style: 'normal' },
        ]},
        { addr: '0xb000  [pTemp]', style: 'new', cells: [
          { idx: '[0]', val: '10', style: 'new' },
          { idx: '[1]', val: '20', style: 'active' },
        ]},
      ],
    },

    // ── State 6: delete[] pInt ────────────────────────────────────
    {
      line: 6,
      status: 'Step 5 — delete[] frees 0xa000. pInt is now dangling — do NOT dereference it!',
      sColor: '#fecaca', sBg: '#7f1d1d',
      stack: [
        { t: 'frame',         name: 'main()',  val: '' },
        { t: 'var',           name: 'size',    val: '2' },
        { t: 'ptr-dangling',  name: 'pInt',    val: '→ 0xa000 ⚠' },
        { t: 'ptr',           name: 'pTemp',   val: '→ 0xb000' },
      ],
      heap: [
        { addr: '0xa000  [freed]', style: 'freed', cells: [
          { idx: '[0]', val: 'freed', style: 'freed' },
        ]},
        { addr: '0xb000  [pTemp]', style: 'new', cells: [
          { idx: '[0]', val: '10', style: 'new' },
          { idx: '[1]', val: '20', style: 'new' },
        ]},
      ],
    },

    // ── State 7: pInt = pTemp ─────────────────────────────────────
    {
      line: 7,
      status: 'Step 6 — pInt = pTemp swings pInt to 0xb000. Both pointers now target [10, 20].',
      sColor: '#bfdbfe', sBg: '#1e3a5f',
      stack: [
        { t: 'frame',      name: 'main()',  val: '' },
        { t: 'var',        name: 'size',    val: '2' },
        { t: 'ptr-active', name: 'pInt',    val: '→ 0xb000' },
        { t: 'ptr',        name: 'pTemp',   val: '→ 0xb000' },
      ],
      heap: [
        { addr: '0xb000  [pInt, pTemp]', style: 'new', cells: [
          { idx: '[0]', val: '10', style: 'new' },
          { idx: '[1]', val: '20', style: 'new' },
        ]},
      ],
    },

    // ── State 8: pTemp = nullptr ──────────────────────────────────
    {
      line: 8,
      status: 'Done! pTemp = nullptr. pInt is the sole owner of [10, 20]. Increase complete ✓',
      sColor: '#bbf7d0', sBg: '#14532d',
      stack: [
        { t: 'frame',    name: 'main()',  val: '' },
        { t: 'var',      name: 'size',    val: '2' },
        { t: 'ptr',      name: 'pInt',    val: '→ 0xb000' },
        { t: 'ptr-null', name: 'pTemp',   val: 'nullptr' },
      ],
      heap: [
        { addr: '0xb000  [pInt]', style: 'new', cells: [
          { idx: '[0]', val: '10', style: 'new' },
          { idx: '[1]', val: '20', style: 'new' },
        ]},
      ],
    },

  ];
}

const STATES = buildStates();
let cur = -1, playing = false, timer = null;

// ── Renderers ────────────────────────────────────────────────────

function renderCode(activeLine) {
  document.getElementById('code-lines').innerHTML = CODE.map((html, i) =>
    `<div class="code-line${i === activeLine ? ' active' : ''}">${html}</div>`
  ).join('');
}

function cellClass(t) {
  return ({
    var:           'cell-var',
    'var-changed': 'cell-var-changed',
    ptr:           'cell-ptr',
    'ptr-active':  'cell-ptr-active',
    'ptr-dangling':'cell-ptr-dangling',
    'ptr-null':    'cell-ptr-null',
  })[t] || 'cell-var';
}

function renderStack(cells) {
  const el = document.getElementById('stack-cells');
  if (!cells.length) { el.innerHTML = '<div class="mem-empty">(empty)</div>'; return; }
  el.innerHTML = cells.map(c => {
    if (c.t === 'frame')
      return `<div class="mem-cell cell-frame">${c.name}</div>`;
    return `<div class="mem-cell ${cellClass(c.t)}">
      <span class="cell-name">${c.name}</span>
      <span class="cell-val">${c.val}</span>
    </div>`;
  }).join('');
}

function hcellClass(s) {
  return ({ normal:'hcell-normal', new:'hcell-new', active:'hcell-active',
            empty:'hcell-empty', freed:'hcell-freed' })[s] || 'hcell-normal';
}

function renderHeap(blocks) {
  const el = document.getElementById('heap-blocks');
  if (!blocks.length) { el.innerHTML = '<div class="mem-empty">(empty)</div>'; return; }
  el.innerHTML = blocks.map(b => {
    const bCls = ({ normal:'block-normal', new:'block-new', freed:'block-freed' })[b.style] || 'block-normal';
    const cellsHtml = b.cells.map(c =>
      `<div class="heap-cell ${hcellClass(c.style)}">
        <div class="heap-cell-idx">${c.idx}</div>
        <div class="heap-cell-val">${c.val}</div>
      </div>`
    ).join('');
    return `<div class="heap-block ${bCls}">
      <div class="heap-block-label">${b.addr}</div>
      <div class="heap-cells-row">${cellsHtml}</div>
    </div>`;
  }).join('');
}

function render(state) {
  renderCode(state.line);
  renderStack(state.stack);
  renderHeap(state.heap);
  const s = document.getElementById('status');
  s.textContent = state.status;
  s.style.color  = state.sColor;
  s.style.background = state.sBg;
}

// ── Controls ─────────────────────────────────────────────────────

function setPlaying(on) {
  playing = on;
  document.getElementById('btn-play').textContent = on ? '⏸ Pause' : '▶ Play';
  if (on) {
    timer = setInterval(() => {
      advance();
      if (cur >= STATES.length - 1) setPlaying(false);
    }, 1300);
  } else {
    clearInterval(timer);
    timer = null;
  }
}

function advance() {
  if (cur >= STATES.length - 1) { doReset(); return; }
  cur++;
  render(STATES[cur]);
  if (cur === STATES.length - 1) setPlaying(false);
}

function doReset() {
  setPlaying(false);
  cur = -1;
  renderCode(-1);
  renderStack([]);
  renderHeap([]);
  const s = document.getElementById('status');
  s.textContent  = 'Ready — press Step or Play to begin.';
  s.style.color  = '#94a3b8';
  s.style.background = '#1e293b';
}

// Attach handlers once — never reassign
document.getElementById('btn-play').addEventListener('click', () => setPlaying(!playing));
document.getElementById('btn-step').addEventListener('click', advance);
document.getElementById('btn-reset').addEventListener('click', doReset);

doReset();
</script>
</body>
</html>
